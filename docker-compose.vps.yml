# VPS deployment (M8) — bot container only.
#
#   docker compose -f docker-compose.vps.yml up -d
#
# The database is NOT here: per the M8 design the bot reuses the VPS's
# existing `postgres-16` container (the odoo-lema project's Postgres) via the
# external `odoo-lema_odoo-net` network — DATABASE_URL in .env points at
# postgres-16:5432 (Docker DNS), not the host-published port. One-time role/db
# creation is documented in docs/plans/2026-07-10-m8-deployment.md.
#
# Local development keeps using docker-compose.yml (dev Postgres only).

services:
  bot:
    build: .
    image: zetryn-bot:latest
    container_name: zetryn-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs # loguru file sink
      - ./data:/app/data # telegram session, later wallet.enc
    networks:
      - odoo-net
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  odoo-net:
    external: true
    name: odoo-lema_odoo-net
