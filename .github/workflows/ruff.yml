name: ruff + import smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: ruff check
        run: ruff check zetryn_bot/ tests/ scripts/
      - name: ruff format --check
        run: ruff format --check zetryn_bot/ tests/ scripts/

  smoke:
    name: import smoke test + pytest
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zetryn_bot_test
          POSTGRES_USER: zetryn
          POSTGRES_PASSWORD: zetryn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zetryn -d zetryn_bot_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # M6 DB integration tests + m6_smoke run against the service above.
      DATABASE_URL: postgresql+asyncpg://zetryn:zetryn@localhost:5432/zetryn_bot_test
      DATABASE_URL_TEST: postgresql+asyncpg://zetryn:zetryn@localhost:5432/zetryn_bot_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (with dev extras)
        # nltk-vader is downloaded at first import of twitter.py; we
        # warm the cache here so the smoke test doesn't hit a download.
        run: |
          pip install -e ".[dev]"
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
      - name: Offline smoke tests
        run: |
          python scripts/m1_smoke.py
          python scripts/m2_smoke.py
          python scripts/m3_smoke.py
          python scripts/m4_smoke.py
          python scripts/m5_smoke.py
          python scripts/m6_smoke.py
          python scripts/m7_smoke.py
      - name: pytest
        run: pytest

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      # Build-only (no registry): catches Dockerfile rot — the VPS builds this
      # same image from a clone via scripts/deploy.sh (see M8 design doc).
      - name: docker build
        run: docker build -t zetryn-bot:ci .
      - name: smoke inside image
        run: docker run --rm zetryn-bot:ci python scripts/m1_smoke.py
